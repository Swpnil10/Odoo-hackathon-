version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ecosphere_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecosphere
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecosphere"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: ecosphere_api
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ecosphere
      - ENVIRONMENT=development
      - SECRET_KEY=94bc90867083f2a7dbda65d95d10d9fa82a1bcfd1264a938c828236d6a54bd24
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=11520
      - BACKEND_CORS_ORIGINS=*
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  pgdata:
